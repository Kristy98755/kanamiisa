<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Miku</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a12; overflow: hidden; }
body { display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Config ---
const W = 400, H = 700;
canvas.width = W;
canvas.height = H;

const GRAVITY = 0.35;
const FLAP = -6.5;
const BIRD_SIZE = 48;
const WHITE_W = 18;
const BLACK_W = 12;
const OCTAVE_W = WHITE_W * 7;
const KEY_H = 22;
const BLACK_KEY_H = 14;
const NOTE_MIN_GAP = 12;
const NOTE_MAX_GAP = 24;
const BASE_SPEED = 2.2;
const ACCEL = 0.0004;
const NOTE_W = 50;

// --- State ---
let bird, notes, score, bestScore = 0, gameOver, gameStarted, speed, frameCount;
let birdImg = new Image();
birdImg.src = 'miku.png';

// --- Piano keys layout (defined in drawPiano) ---

function drawPiano(y, isTop) {
  const octaves = Math.ceil(W / OCTAVE_W) + 1;
  for (let o = 0; o < octaves; o++) {
    const ox = o * OCTAVE_W;
    // White keys first (lower z-index)
    for (let k = 0; k < 7; k++) {
      const kx = ox + k * WHITE_W;
      ctx.fillStyle = '#ddd';
      ctx.fillRect(kx, y, WHITE_W - 1, KEY_H);
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(kx, y, WHITE_W - 1, KEY_H);
    }
    // Black keys on top (higher z-index, drawn after)
    const blackOffsets = [WHITE_W - BLACK_W/2, WHITE_W*2 - BLACK_W/2, WHITE_W*4 - BLACK_W/2, WHITE_W*5 - BLACK_W/2, WHITE_W*6 - BLACK_W/2];
    for (let b = 0; b < 5; b++) {
      const bx = ox + blackOffsets[b];
      const by = isTop ? y : y + KEY_H - BLACK_KEY_H;
      ctx.fillStyle = '#111';
      ctx.fillRect(bx, by, BLACK_W, BLACK_KEY_H);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(bx, by, BLACK_W, BLACK_KEY_H);
    }
  }
}

function reset() {
  bird = { x: 80, y: H / 2, vel: 0, rot: 0 };
  notes = [];
  score = 0;
  speed = BASE_SPEED;
  gameOver = false;
  gameStarted = false;
  frameCount = 0;
}

function spawnNote() {
  const gapKeys = NOTE_MIN_GAP + Math.floor(Math.random() * (NOTE_MAX_GAP - NOTE_MIN_GAP + 1));
  const gapPx = gapKeys * WHITE_W;
  const minTop = KEY_H + 20;
  const maxTop = H - KEY_H - gapPx - 20;
  const top = minTop + Math.random() * (maxTop - minTop);
  // Random note type for visual variety
  const noteTypes = ['♩', '♪', '♫', '♬'];
  const noteType = noteTypes[Math.floor(Math.random() * noteTypes.length)];
  notes.push({ x: W + 50, top, gap: gapPx, scored: false, noteType });
}

function update() {
  if (gameOver || !gameStarted) return;
  frameCount++;
  speed = BASE_SPEED + frameCount * ACCEL;

  bird.vel += GRAVITY;
  bird.y += bird.vel;
  bird.rot = Math.min(Math.max(bird.vel * 3, -30), 90);

  // Spawn notes
  if (frameCount % Math.floor(90 / (speed / BASE_SPEED)) === 0 || notes.length === 0) {
    spawnNote();
  }

  // Move notes
  for (let n of notes) {
    n.x -= speed;
    // Score
    if (!n.scored && n.x + NOTE_W < bird.x) {
      n.scored = true;
      score++;
    }
  }
  notes = notes.filter(n => n.x > -NOTE_W - 20);

  // Collision
  if (bird.y - BIRD_SIZE/2 < KEY_H || bird.y + BIRD_SIZE/2 > H - KEY_H) {
    endGame();
    return;
  }
  for (let n of notes) {
    const bx = bird.x - BIRD_SIZE/2 + 4;
    const by = bird.y - BIRD_SIZE/2 + 4;
    const bw = BIRD_SIZE - 8;
    const bh = BIRD_SIZE - 8;
    // Left note wall
    if (n.x < bx + bw && n.x + NOTE_W > bx) {
      if (by < n.top || by + bh > n.top + n.gap) {
        endGame();
        return;
      }
    }
  }
}

function endGame() {
  gameOver = true;
  if (score > bestScore) bestScore = score;
}

function drawNoteBlock(x, top, gap, noteType) {
  // Top block
  const grad1 = ctx.createLinearGradient(x, 0, x + NOTE_W, 0);
  grad1.addColorStop(0, '#1a1a3e');
  grad1.addColorStop(0.5, '#2a2a5e');
  grad1.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad1;
  ctx.fillRect(x, KEY_H, NOTE_W, top - KEY_H);

  // Bottom block
  const grad2 = ctx.createLinearGradient(x, 0, x + NOTE_W, 0);
  grad2.addColorStop(0, '#1a1a3e');
  grad2.addColorStop(0.5, '#2a2a5e');
  grad2.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad2;
  ctx.fillRect(x, top + gap, NOTE_W, H - KEY_H - top - gap);

  // Note symbol in top block
  ctx.fillStyle = '#19e6f5';
  ctx.font = '32px serif';
  ctx.textAlign = 'center';
  if (top > 60) ctx.fillText(noteType, x + NOTE_W/2, top/2 + KEY_H/2 + 10);

  // Note symbol in bottom block
  const bottomCenter = top + gap + (H - KEY_H - top - gap) / 2;
  if (H - KEY_H - top - gap > 60) ctx.fillText(noteType, x + NOTE_W/2, bottomCenter + 10);

  // Glow edges
  ctx.shadowColor = '#19e6f5';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = '#19e6f555';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, KEY_H, NOTE_W, top - KEY_H);
  ctx.strokeRect(x, top + gap, NOTE_W, H - KEY_H - top - gap);
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Notes (behind piano)
  for (let n of notes) {
    drawNoteBlock(n.x, n.top, n.gap, n.noteType);
  }

  // Piano on top of everything
  drawPiano(-1, true);
  drawPiano(H - KEY_H + 1, false);

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot * Math.PI / 180);
  if (birdImg.complete) {
    ctx.drawImage(birdImg, -BIRD_SIZE/2, -BIRD_SIZE/2, BIRD_SIZE, BIRD_SIZE);
  } else {
    ctx.fillStyle = '#19e6f5';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_SIZE/2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 4;
  ctx.fillText(score, W/2, 50);
  ctx.shadowBlur = 0;

  // Start / Game Over
  if (!gameStarted) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#19e6f5';
    ctx.font = 'bold 36px Inter, sans-serif';
    ctx.fillText('FLAPPY', W/2, H/2 - 40);
    ctx.font = 'bold 48px Inter, sans-serif';
    ctx.fillText('MIKU', W/2, H/2 + 15);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px Inter, sans-serif';
    ctx.fillText('Нажми или тапни чтобы начать', W/2, H/2 + 60);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4fa6';
    ctx.font = 'bold 40px Inter, sans-serif';
    ctx.fillText('GAME OVER', W/2, H/2 - 30);
    ctx.fillStyle = '#fff';
    ctx.font = '22px Inter, sans-serif';
    ctx.fillText('Счёт: ' + score, W/2, H/2 + 15);
    ctx.fillStyle = '#19e6f5';
    ctx.font = '16px Inter, sans-serif';
    ctx.fillText('Рекорд: ' + bestScore, W/2, H/2 + 45);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px Inter, sans-serif';
    ctx.fillText('Нажми чтобы начать заново', W/2, H/2 + 80);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function flap() {
  if (gameOver) {
    reset();
    return;
  }
  if (!gameStarted) {
    gameStarted = true;
  }
  bird.vel = FLAP;
}

// Input
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

reset();
loop();
</script>
</body>
</html>
