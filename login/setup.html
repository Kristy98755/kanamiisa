<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Настройка TOTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .setup-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
        }
        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .setup-header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        .setup-header p {
            font-size: 14px;
            color: #888;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #45a049;
        }
        .submit-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .error-message {
            display: none;
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message.visible {
            display: block;
        }
        .success-message {
            display: none;
            padding: 12px;
            background: #1a3a1a;
            border: 1px solid #2a5a2a;
            border-radius: 8px;
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .success-message.visible {
            display: block;
        }
        .qr-container {
            display: none;
            text-align: center;
            margin-top: 24px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
        }
        .qr-container.visible {
            display: block;
        }
        .qr-container img {
            max-width: 200px;
            margin-bottom: 16px;
        }
        .secret-display {
            font-family: monospace;
            font-size: 14px;
            color: #333;
            word-break: break-all;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            margin-top: 12px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <h1>Настройка TOTP</h1>
                <p>Генерация секрета для Google Authenticator</p>
            </div>

            <div id="error" class="error-message"></div>
            <div id="success" class="success-message"></div>

            <!-- Cheat Code Form -->
            <div id="code-form-container">
                <form id="code-form">
                    <div class="form-group">
                        <label>Код доступа</label>
                        <input type="text" id="cheat-code" placeholder="Введите код" autocomplete="off">
                    </div>
                    <button type="submit" class="submit-btn" id="code-btn">Получить доступ</button>
                </form>
            </div>

            <!-- Setup Panel (hidden by default) -->
            <div id="setup-panel" style="display: none;">
                <div class="section-title">Новый секрет</div>
                <button type="button" class="submit-btn" id="generate-btn" style="margin-bottom: 16px;">Сгенерировать новый секрет</button>

                <div id="qr-container" class="qr-container">
                    <img id="qr-image" src="" alt="QR Code">
                    <div class="secret-display" id="secret-display"></div>
                    <p style="font-size: 12px; color: #666; margin-top: 12px;">
                        Отсканируйте QR-код в Google Authenticator
                    </p>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Текущий секрет</div>
                    <button type="button" class="submit-btn" id="show-current-btn" style="background: #333;">Показать текущий</button>
                    <div id="current-qr" class="qr-container" style="margin-top: 16px;">
                        <img id="current-qr-image" src="" alt="QR Code">
                        <div class="secret-display" id="current-secret-display"></div>
                    </div>
                </div>
            </div>

            <a href="/login" class="back-link">← Вернуться к входу</a>
        </div>
    </div>

    <script>
        let accessCode = '';

        document.getElementById('code-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const code = document.getElementById('cheat-code').value.trim();
            if (!code) {
                showError('Введите код');
                return;
            }

            accessCode = code;

            // Verify code by trying to get current secret
            try {
                const res = await fetch('/login/api/secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('code-form-container').style.display = 'none';
                    document.getElementById('setup-panel').style.display = 'block';

                    if (data.qr_url) {
                        document.getElementById('current-qr-image').src = data.qr_url;
                        document.getElementById('current-secret-display').textContent = data.secret;
                        document.getElementById('current-qr').classList.add('visible');
                    }
                } else {
                    showError('Неверный код');
                }
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            hideError();

            try {
                const res = await fetch('/login/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка');
                    return;
                }

                document.getElementById('qr-image').src = data.qr_url;
                document.getElementById('secret-display').textContent = data.secret;
                document.getElementById('qr-container').classList.add('visible');

                showSuccess('Новый секрет сгенерирован. Отсканируйте QR-код.');
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        document.getElementById('show-current-btn').addEventListener('click', async () => {
            hideError();

            try {
                const res = await fetch('/login/api/secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка');
                    return;
                }

                if (data.qr_url) {
                    document.getElementById('current-qr-image').src = data.qr_url;
                    document.getElementById('current-secret-display').textContent = data.secret;
                    document.getElementById('current-qr').classList.add('visible');
                } else {
                    showError('TOTP не настроен');
                }
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('visible');
            document.getElementById('success').classList.remove('visible');
        }

        function showSuccess(message) {
            const el = document.getElementById('success');
            el.textContent = message;
            el.classList.add('visible');
            document.getElementById('error').classList.remove('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }

        // Auto-focus
        document.getElementById('cheat-code').focus();
    </script>
</body>
</html>
