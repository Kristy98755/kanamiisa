<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 14px;
            color: #888;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #333;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab:hover {
            color: #fff;
        }
        .tab.active {
            color: #4CAF50;
            border-bottom-color: #4CAF50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #45a049;
        }
        .submit-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .error-message {
            display: none;
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message.visible {
            display: block;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Kanamiisa</h1>
                <p>Система медицинской записи</p>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="totp">Администратор</button>
                <button class="tab" data-tab="password">Пользователь</button>
            </div>

            <div id="error" class="error-message"></div>

            <!-- TOTP Login (Root) -->
            <div id="totp-panel" class="form-panel active">
                <form id="totp-form">
                    <div class="form-group">
                        <label>Код из приложения</label>
                        <input type="text" id="totp-code" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*">
                    </div>
                    <button type="submit" class="submit-btn" id="totp-btn">Войти</button>
                </form>
            </div>

            <!-- Password Login (Guest) -->
            <div id="password-panel" class="form-panel">
                <form id="password-form">
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" id="username" placeholder="user" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn" id="password-btn">Войти</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.form-panel');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
            });
        });

        // Error display
        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }

        // TOTP Login
        document.getElementById('totp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const code = document.getElementById('totp-code').value.trim();
            if (!code || code.length !== 6) {
                showError('Введите 6-значный код');
                return;
            }

            const btn = document.getElementById('totp-btn');
            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                const res = await fetch('/login/api/totp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка авторизации');
                    btn.disabled = false;
                    btn.textContent = 'Войти';
                    return;
                }

                // Store session info
                sessionStorage.setItem('is_root', data.is_root);
                sessionStorage.setItem('username', 'kanamiisa');

                // Redirect to stenographist
                window.location.href = '/stenographist/';
            } catch (err) {
                showError('Ошибка сети');
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });

        // Password Login
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            const btn = document.getElementById('password-btn');
            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                const res = await fetch('/login/api/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка авторизации');
                    btn.disabled = false;
                    btn.textContent = 'Войти';
                    return;
                }

                // Store session info
                sessionStorage.setItem('is_root', data.is_root);
                sessionStorage.setItem('username', username);

                // Redirect to stenographist
                window.location.href = '/stenographist/';
            } catch (err) {
                showError('Ошибка сети');
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });

        // Auto-focus TOTP input
        document.getElementById('totp-code').focus();
    </script>
</body>
</html>
