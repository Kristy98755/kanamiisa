    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fffaf4;
      color: #143211;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      background: #5d755d;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fffaf4;
      font-size: 36px;
      font-weight: 700;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
      color: #5d755d;
      margin-bottom: 4px;
    }

    .bio {
      font-size: 13px;
      color: #8a9988;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 28px;
      max-width: 360px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: #143211;
      text-align: center;
      margin-bottom: 12px;
      width: 100%;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      transition: opacity .2s, transform .1s;
      border: none;
      cursor: pointer;
    }

    .link-btn:hover { opacity: .85; transform: scale(1.01); }
    .link-btn:active { transform: scale(.98); }

    .link-btn .icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 28px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      transition: opacity .2s, transform .1s;
    }

    .social-btn:hover { opacity: .85; transform: scale(1.08); }
    .social-btn:active { transform: scale(.95); }

    .social-btn .icon { width: 24px; height: 24px; fill: currentColor; }

    .divider {
      width: 60%;
      border: none;
      border-top: 1px solid #d6cdc2;
      margin: 4px 0 24px;
    }
  </style>
