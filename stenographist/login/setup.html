<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Настройка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .setup-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
        }
        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .setup-header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        .setup-header p {
            font-size: 14px;
            color: #888;
        }
        .qr-container {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .qr-container img {
            max-width: 200px;
            margin-bottom: 16px;
        }
        .secret-display {
            font-family: monospace;
            font-size: 14px;
            color: #333;
            word-break: break-all;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            margin-top: 12px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: #4CAF50;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #333;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .error-message {
            display: none;
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message.visible {
            display: block;
        }
        .hidden {
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <h1>Настройка</h1>
                <p>Введите код доступа</p>
            </div>

            <div id="error" class="error-message"></div>

            <!-- Lock screen -->
            <div id="lock">
                <div class="form-group">
                    <label>Код доступа</label>
                    <input type="password" id="access-code" placeholder="••••••" inputmode="numeric" autocomplete="off">
                </div>
                <button type="button" class="btn btn-primary" id="unlock-btn">Разблокировать</button>
            </div>

            <!-- Setup panel (hidden until unlocked) -->
            <div id="setup-panel" class="hidden">
                <div class="section-title">Новый TOTP-секрет</div>
                <button type="button" class="btn btn-primary" id="generate-btn">Сгенерировать новый секрет</button>

                <div id="qr-container" class="qr-container hidden">
                    <img id="qr-image" src="" alt="QR Code">
                    <div class="secret-display" id="secret-display"></div>
                    <p style="font-size: 12px; color: #666; margin-top: 12px;">
                        Отсканируйте QR-код в Google Authenticator
                    </p>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Текущий секрет</div>
                    <button type="button" class="btn btn-secondary" id="show-current-btn">Показать текущий</button>
                    <div id="current-qr" class="qr-container hidden" style="margin-top: 16px;">
                        <img id="current-qr-image" src="" alt="QR Code">
                        <div class="secret-display" id="current-secret-display"></div>
                    </div>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Биометрия (Passkey / Windows Hello)</div>
                    <button type="button" class="btn btn-primary" id="webauthn-btn">Зарегистрировать биометрию</button>
                    <p id="webauthn-status" style="font-size: 12px; color: #888; margin-top: 12px;"></p>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Готово</div>
                    <a href="/login" class="btn btn-secondary" style="text-decoration: none; text-align: center; display: block;">Вернуться ко входу</a>
                </div>
            </div>

            <a href="/login" class="back-link">← Вернуться ко входу</a>
        </div>
    </div>

    <script src="/qrcode.js"></script>
    <script>
        let unlockedCode = null;

        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }

        async function verifyCode(code) {
            const res = await fetch('/login/api/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            return res.ok;
        }

        async function unlock() {
            hideError();
            const code = document.getElementById('access-code').value.trim();
            if (!code) {
                showError('Введите код доступа');
                return;
            }
            const valid = await verifyCode(code);
            if (!valid) {
                showError('Неверный код доступа');
                return;
            }
            unlockedCode = code;
            document.getElementById('lock').classList.add('hidden');
            document.getElementById('setup-panel').classList.remove('hidden');
        }

        document.getElementById('unlock-btn').addEventListener('click', unlock);
        document.getElementById('access-code').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') unlock();
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            hideError();
            if (!unlockedCode) return;
            try {
                const res = await fetch('/login/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: unlockedCode })
                });
                const data = await res.json();
                if (!res.ok) { showError(data.error || 'Ошибка'); return; }

                const qr = qrcode(0, 'M');
                qr.addData(data.uri);
                qr.make();
                const svgData = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(qr.createSvgTag(4, 8));
                document.getElementById('qr-image').src = svgData;
                document.getElementById('secret-display').textContent = data.secret;
                document.getElementById('qr-container').classList.remove('hidden');
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        document.getElementById('show-current-btn').addEventListener('click', async () => {
            hideError();
            if (!unlockedCode) return;
            try {
                const res = await fetch('/login/api/secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: unlockedCode })
                });
                const data = await res.json();
                if (!res.ok) { showError(data.error || 'Ошибка'); return; }

                if (data.uri) {
                    const qr = qrcode(0, 'M');
                    qr.addData(data.uri);
                    qr.make();
                    const svgData = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(qr.createSvgTag(4, 8));
                    document.getElementById('current-qr-image').src = svgData;
                    document.getElementById('current-secret-display').textContent = data.secret;
                    document.getElementById('current-qr').classList.remove('hidden');
                } else {
                    showError('TOTP не настроен');
                }
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        function b64urlToBuf(b64url) {
            const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
            const pad = b64.length % 4 ? '='.repeat(4 - (b64.length % 4)) : '';
            const bin = atob(b64 + pad);
            const buf = new ArrayBuffer(bin.length);
            const view = new Uint8Array(buf);
            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
            return buf;
        }

        function bufToB64url(buf) {
            const bytes = new Uint8Array(buf);
            let s = '';
            for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
            return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        if (!window.PublicKeyCredential) {
            const wb = document.getElementById('webauthn-btn');
            wb.style.display = 'none';
            document.getElementById('webauthn-status').textContent = 'Браузер не поддерживает биометрию.';
        } else {
            document.getElementById('webauthn-btn').addEventListener('click', async () => {
                hideError();
                if (!unlockedCode) return;
                const btn = document.getElementById('webauthn-btn');
                const status = document.getElementById('webauthn-status');
                btn.disabled = true;
                status.textContent = 'Ожидание биометрии...';
                try {
                    const beginRes = await fetch('/login/api/setup/webauthn/begin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pin: unlockedCode })
                    });
                    const beginData = await beginRes.json();
                    if (!beginRes.ok) throw new Error(beginData.error || 'Ошибка запуска');

                    const opts = beginData.options;
                    opts.challenge = b64urlToBuf(opts.challenge);
                    if (opts.user && opts.user.id) opts.user.id = b64urlToBuf(opts.user.id);
                    if (opts.excludeCredentials) {
                        opts.excludeCredentials = opts.excludeCredentials.map((c) => ({ ...c, id: b64urlToBuf(c.id) }));
                    }

                    const cred = await navigator.credentials.create({ publicKey: opts });

                    const response = {
                        id: cred.id,
                        rawId: bufToB64url(cred.rawId),
                        type: cred.type,
                        response: {
                            clientDataJSON: bufToB64url(cred.response.clientDataJSON),
                            attestationObject: bufToB64url(cred.response.attestationObject),
                            transports: cred.response.getTransports ? cred.response.getTransports() : []
                        }
                    };

                    const finishRes = await fetch('/login/api/setup/webauthn/finish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ flowToken: beginData.flowToken, response })
                    });
                    const finishData = await finishRes.json();
                    if (!finishRes.ok) throw new Error(finishData.error || 'Регистрация не удалась');

                    status.textContent = '✅ Биометрия зарегистрирована. Теперь можно входить по ней.';
                    status.style.color = '#4CAF50';
                } catch (err) {
                    status.textContent = err.message || 'Ошибка регистрации';
                    status.style.color = '#ff6b6b';
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Зарегистрировать биометрию';
                }
            });
        }
    </script>
</body>
</html>
