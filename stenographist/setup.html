<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Настройка TOTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .setup-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
        }
        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .setup-header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        .setup-header p {
            font-size: 14px;
            color: #888;
        }
        .qr-container {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .qr-container img {
            max-width: 200px;
            margin-bottom: 16px;
        }
        .secret-display {
            font-family: monospace;
            font-size: 14px;
            color: #333;
            word-break: break-all;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            margin-top: 12px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: #4CAF50;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #333;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .error-message {
            display: none;
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message.visible {
            display: block;
        }
        .hidden {
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <h1>Настройка TOTP</h1>
                <p>Генерация секрета для Google Authenticator</p>
            </div>

            <div id="error" class="error-message"></div>

            <!-- Waiting for cheat code -->
            <div id="waiting" class="hidden">
                <p style="text-align: center; color: #888;">Запрос кода доступа...</p>
            </div>

            <!-- Setup panel (hidden until authenticated) -->
            <div id="setup-panel" class="hidden">
                <div class="section-title">Новый секрет</div>
                <button type="button" class="btn btn-primary" id="generate-btn">Сгенерировать новый секрет</button>

                <div id="qr-container" class="qr-container hidden">
                    <img id="qr-image" src="" alt="QR Code">
                    <div class="secret-display" id="secret-display"></div>
                    <p style="font-size: 12px; color: #666; margin-top: 12px;">
                        Отсканируйте QR-код в Google Authenticator
                    </p>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Текущий секрет</div>
                    <button type="button" class="btn btn-secondary" id="show-current-btn">Показать текущий</button>
                    <div id="current-qr" class="qr-container hidden" style="margin-top: 16px;">
                        <img id="current-qr-image" src="" alt="QR Code">
                        <div class="secret-display" id="current-secret-display"></div>
                    </div>
                </div>

                <div style="margin-top: 24px;">
                    <div class="section-title">Готово</div>
                    <a href="/stenographist/login" class="btn btn-secondary" style="text-decoration: none; text-align: center; display: block;">Вернуться ко входу</a>
                </div>
            </div>

            <a href="/stenographist/login" class="back-link">← Вернуться ко входу</a>
        </div>
    </div>

    <script>
        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }

        async function verifyCheatCode(code) {
            try {
                const res = await fetch('/stenographist/login/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                if (res.ok) {
                    return true;
                }
                return false;
            } catch (err) {
                return false;
            }
        }

        async function init() {
            // Show prompt for cheat code
            const code = prompt('Введите код доступа:');
            
            if (code === null) {
                // User cancelled
                window.location.href = '/stenographist/login';
                return;
            }

            if (code === '') {
                showError('Код не может быть пустым');
                return;
            }

            const valid = await verifyCheatCode(code);
            
            if (!valid) {
                showError('Неверный код доступа');
                return;
            }

            // Show setup panel
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('setup-panel').classList.remove('hidden');
        }

        document.getElementById('generate-btn').addEventListener('click', async () => {
            hideError();

            try {
                const code = prompt('Введите код доступа:');
                if (!code) return;

                const res = await fetch('/stenographist/login/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка');
                    return;
                }

                document.getElementById('qr-image').src = data.qr_url;
                document.getElementById('secret-display').textContent = data.secret;
                document.getElementById('qr-container').classList.remove('hidden');

                showSuccess('Новый секрет сгенерирован. Отсканируйте QR-код.');
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        document.getElementById('show-current-btn').addEventListener('click', async () => {
            hideError();

            try {
                const code = prompt('Введите код доступа:');
                if (!code) return;

                const res = await fetch('/stenographist/login/api/secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Ошибка');
                    return;
                }

                if (data.qr_url) {
                    document.getElementById('current-qr-image').src = data.qr_url;
                    document.getElementById('current-secret-display').textContent = data.secret;
                    document.getElementById('current-qr').classList.remove('hidden');
                } else {
                    showError('TOTP не настроен');
                }
            } catch (err) {
                showError('Ошибка сети');
            }
        });

        function showSuccess(message) {
            // Could add a success message element if needed
            console.log(message);
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
