<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 14px;
            color: #888;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .form-group input::placeholder {
            color: #555;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #45a049;
        }
        .submit-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .error-message {
            display: none;
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Stenographist</h1>
                <p>Система медицинской записи</p>
            </div>

            <div id="error" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="username" placeholder="user" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Войти</button>
            </form>
        </div>
    </div>

    <script>
        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error').classList.remove('visible');
        }

        const LOGIN_REDIRECTS = {
            stenographist: '/stenographist/index.html',
            panel: '/stenographist/panel.html',
            mail: '/mail'
        };
        const LOGIN_FROM = new URLSearchParams(location.search).get('from') || 'stenographist';

        async function collectClientInfo() {
            const info = {
                screen: {
                    width: screen.width,
                    height: screen.height,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight,
                    colorDepth: screen.colorDepth,
                    pixelDepth: screen.pixelDepth,
                    orientation: screen.orientation?.type || null
                },
                window: {
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight,
                    outerWidth: window.outerWidth,
                    outerHeight: window.outerHeight,
                    devicePixelRatio: window.devicePixelRatio
                },
                navigator: {
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages?.slice(),
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    onLine: navigator.onLine,
                    webdriver: navigator.webdriver,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    maxTouchPoints: navigator.maxTouchPoints,
                    vendor: navigator.vendor,
                    vendorSub: navigator.vendorSub,
                    productSub: navigator.productSub
                },
                timezone: {
                    offset: new Date().getTimezoneOffset(),
                    locale: Intl.DateTimeFormat().resolvedOptions().locale,
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                }
            };

            try {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn) {
                    info.network = {
                        effectiveType: conn.effectiveType,
                        downlink: conn.downlink,
                        downlinkMax: conn.downlinkMax,
                        rtt: conn.rtt,
                        saveData: conn.saveData,
                        type: conn.type,
                        daemonType: conn.daemonType
                    };
                }
            } catch {}

            try {
                const battery = await navigator.getBattery();
                info.battery = {
                    level: battery.level,
                    charging: battery.charging,
                    chargingTime: battery.chargingTime,
                    dischargingTime: battery.dischargingTime
                };
                battery.addEventListener('levelchange', () => { info.battery.level = battery.level; });
                battery.addEventListener('chargingchange', () => { info.battery.charging = battery.charging; });
            } catch {}

            try {
                if (performance.memory) {
                    info.memory = {
                        jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
                        totalJSHeapSize: performance.memory.totalJSHeapSize,
                        usedJSHeapSize: performance.memory.usedJSHeapSize
                    };
                }
            } catch {}

            try {
                const gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                    info.gpu = {
                        vendor: dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
                        renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
                        version: gl.getParameter(gl.VERSION),
                        shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION)
                    };
                }
            } catch {}

            return info;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                const clientInfo = await collectClientInfo();
                const res = await fetch('/stenographist/login/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, clientInfo })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Неправильный логин или пароль');
                    btn.disabled = false;
                    btn.textContent = 'Войти';
                    return;
                }

                sessionStorage.setItem('is_root', data.is_root);
                sessionStorage.setItem('username', username);

                window.location.href = LOGIN_REDIRECTS[LOGIN_FROM] || LOGIN_REDIRECTS.stenographist;
            } catch (err) {
                showError('Неправильный логин или пароль');
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });

        document.getElementById('username').focus();
    </script>
</body>
</html>
