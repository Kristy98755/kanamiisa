<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanamiisa — Панель управления</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .header-btn {
            padding: 8px 16px;
            background: #333;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-btn:hover {
            background: #444;
        }
        .header-btn.primary {
            background: #4CAF50;
        }
        .header-btn.primary:hover {
            background: #45a049;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #333;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab:hover {
            color: #fff;
        }
        .tab.active {
            color: #4CAF50;
            border-bottom-color: #4CAF50;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 500;
        }
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4CAF50;
            color: #fff;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-danger {
            background: #5a2a2a;
            color: #ff6b6b;
        }
        .btn-danger:hover {
            background: #6a3a3a;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 14px;
        }
        tr:hover {
            background: #1a1a1a;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #555;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #333;
            border-radius: 4px;
            font-size: 12px;
            color: #888;
        }
        .badge.root {
            background: #2a3a2a;
            color: #4CAF50;
        }
        .error-message {
            padding: 12px;
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .device-info {
            font-size: 12px;
            color: #888;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .log-row { cursor: pointer; }
        .log-row:hover { background: #1a1a1a; }
        .log-row.root-session { background: rgba(0, 188, 212, 0.08); }
        .log-row.root-session:hover { background: rgba(0, 188, 212, 0.12); }
        .log-details {
            display: none;
            background: #111;
            border-top: 1px solid #333;
        }
        .log-details.open { display: table-row; }
        .log-date {
            background: #0c0e13;
            color: #e6e6e6;
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            padding: 4px 8px;
            color-scheme: dark;
            font: inherit;
        }
        .log-details td {
            padding: 16px 24px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.8;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .flag { font-size: 16px; margin-right: 6px; vertical-align: middle; }
        .active-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .kicked-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FF9800;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .kill-btn {
            background: none;
            border: 1px solid #5a2a2a;
            color: #ff6b6b;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            transition: all 0.2s;
        }
        .kill-btn:hover {
            background: #ff6b6b;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Панель управления</h1>
        <div class="header-actions">
            <a href="/mail" class="header-btn">Почта</a>
            <a href="/stenographist/" class="header-btn">Stenographist</a>
            <button class="header-btn" id="logout-btn">Выйти</button>
        </div>
    </div>

    <div class="main-container">
        <div class="tabs">
            <button class="tab active" data-tab="users">Пользователи</button>
            <button class="tab" data-tab="logs">История входов</button>
        </div>

        <!-- Users Tab -->
        <div id="users-panel" class="tab-panel active">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Учётные записи</span>
                </div>

                <div id="users-error" class="error-message" style="display: none;"></div>

                <form id="create-user-form" style="margin-bottom: 24px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Имя пользователя</label>
                            <input type="text" id="new-username" placeholder="user" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="new-password" placeholder="••••••••" required>
                        </div>
                        <div style="display: flex; align-items: flex-end;">
                            <button type="submit" class="btn btn-primary">Создать</button>
                        </div>
                    </div>
                </form>

                <table>
                    <thead>
                        <tr>
                            <th>Пользователь</th>
                            <th>Создан</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <tr>
                            <td colspan="3" class="empty-state">Загрузка...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Logs Tab -->
        <div id="logs-panel" class="tab-panel">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">История входов</span>
                    <input type="date" id="log-from" class="log-date" title="С (включительно)">
                    <input type="date" id="log-to" class="log-date" title="По (включительно)">
                    <button class="btn btn-sm" id="delete-logs-btn" style="background:#3a1a1a;color:#ff6b6b;">Удалить</button>
                    <button class="btn btn-sm" id="refresh-logs-btn" style="background: #333; color: #fff;">Обновить</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Вход</th>
                            <th>Время</th>
                            <th>Пользователь</th>
                            <th>Страна</th>
                            <th>Устройство</th>
                            <th style="text-align:right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table">
                        <tr>
                            <td colspan="6" class="empty-state">Загрузка...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Check auth (server-side)
        async function checkAuth() {
            try {
                const res = await fetch('/stenographist/api/session');
                if (!res.ok) {
                    window.location.href = '/login';
                    return false;
                }
                const data = await res.json();
                if (!data.valid || data.role !== 'root') {
                    window.location.href = '/login';
                    return false;
                }
                return true;
            } catch {
                window.location.href = '/login';
                return false;
            }
        }

        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.tab-panel');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
            });
        });

        // Load users
        async function loadUsers() {
            try {
                const res = await fetch('/stenographist/api/users');
                if (!res.ok) throw new Error('Failed to load users');

                const data = await res.json();
                const tbody = document.getElementById('users-table');

                if (!data.users || data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state">Нет пользователей</td></tr>';
                    return;
                }

                tbody.innerHTML = data.users.map(user => renderUserRow(user)).join('');
            } catch (err) {
                console.error('Failed to load users:', err);
            }
        }

        function renderUserRow(user) {
            const isRoot = user.username === 'kanamiisa';
            return `
                <tr data-username="${escapeHtml(user.username)}">
                    <td>${escapeHtml(user.username)}${isRoot ? ' <span class="badge root">Root</span>' : ''}</td>
                    <td>${new Date(user.created_at).toLocaleDateString('ru-RU')}</td>
                    <td>
                        ${!isRoot ? `
                            <button class="btn btn-sm" style="background:#333;color:#fff;" onclick="changePassword('${escapeHtml(user.username)}')">Сменить пароль</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${escapeHtml(user.username)}')">Удалить</button>
                        ` : ''}
                    </td>
                </tr>
            `;
        }

        // Create user
        document.getElementById('create-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;

            if (!username || !password) {
                showError('users-error', 'Заполните все поля');
                return;
            }

            try {
                const res = await fetch('/stenographist/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const data = await res.json();
                    showError('users-error', data.error || 'Ошибка');
                    return;
                }

                document.getElementById('new-username').value = '';
                document.getElementById('new-password').value = '';
                hideError('users-error');

                const tbody = document.getElementById('users-table');
                const emptyRow = tbody.querySelector('.empty-state');
                if (emptyRow) emptyRow.closest('tr').remove();

                const user = { username, created_at: Date.now() };
                tbody.insertAdjacentHTML('beforeend', renderUserRow(user));
            } catch (err) {
                showError('users-error', 'Ошибка сети');
            }
        });

        // Delete user
        async function deleteUser(username) {
            if (!confirm(`Удалить пользователя ${username}?`)) return;

            try {
                const res = await fetch(`/stenographist/api/users/${encodeURIComponent(username)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const data = await res.json();
                    alert(data.error || 'Ошибка');
                    return;
                }

                const row = document.querySelector(`tr[data-username="${CSS.escape(username)}"]`);
                if (row) row.remove();
            } catch (err) {
                alert('Ошибка сети');
            }
        }

        // Change password
        async function changePassword(username) {
            const password = prompt(`Новый пароль для ${username}:`);
            if (!password) return;

            try {
                const res = await fetch(`/stenographist/api/users/${encodeURIComponent(username)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!res.ok) {
                    const data = await res.json();
                    alert(data.error || 'Ошибка');
                    return;
                }

                alert('Пароль изменён');
            } catch (err) {
                alert('Ошибка сети');
            }
        }

        // Log lexeme expand (mirror of worker/auth.js compression)
        const LEX = { 'Wi':'Windows','Ma':'macOS','Li':'Linux','An':'Android','iO':'iOS','Ch':'Chrome','Fx':'Firefox','Ed':'Edge','Sa':'Safari','gI':'Google Inc.','aI':'Apple Inc.','s2':'slow-2g','wf':'wifi','cl':'cellular','et':'ethernet','bt':'bluetooth','lp':'landscape-primary','ls':'landscape-secondary','pp':'portrait-primary','ps':'portrait-secondary' };
        const UA_LEX = [ ['M5','Mozilla/5.0'],['AW','AppleWebKit/537.36'],['lkGk','KHTML, like Gecko'],['Gk','Gecko/20100101'],['Ch/','Chrome/'],['Sa/','Safari/'],['Ed/','Edg/'],['Fx/','Firefox/'],['Vr/','Version/'],['W64','Win64; x64'],['W10','Windows NT 10.0'],['MOS','Macintosh; Intel Mac OS X'],['LX','X11; Linux x86_64'] ];
        function lexExpandStr(v) {
            if (typeof v !== 'string') return v;
            let s = v;
            for (const [tok, orig] of UA_LEX) s = s.split(tok).join(orig);
            if (LEX[s] !== undefined) return LEX[s];
            return s;
        }
        function lexExpandObj(o) {
            if (Array.isArray(o)) return o.map(lexExpandObj);
            if (o && typeof o === 'object') { const r = {}; for (const k in o) r[k] = lexExpandObj(o[k]); return r; }
            return lexExpandStr(o);
        }
        function fromIcon(from) {
            if (from === 'panel') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>';
            if (from === 'mail') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
            if (from === 'stenographist') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>';
            return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>';
        }

        // Load logs
        async function loadLogs() {
            try {
                const res = await fetch('/stenographist/api/logs');
                if (!res.ok) throw new Error('Failed to load logs');

                const data = await res.json();
                const tbody = document.getElementById('logs-table');

                if (!data.logs || data.logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет записей</td></tr>';
                    return;
                }

                tbody.innerHTML = data.logs.map((log, i) => renderLogRow(log, i)).join('');
                refreshActiveDots();
            } catch (err) {
                console.error('Failed to load logs:', err);
            }
        }

        async function refreshActiveDots() {
            try {
                const sres = await fetch('/stenographist/api/sessions');
                if (!sres.ok) return;
                const sdata = await sres.json();
                const activeIds = new Set((sdata.sessions || []).filter(s => s.active).map(s => s.session_id));
                document.querySelectorAll('#logs-table tr.log-row').forEach(tr => {
                    const sid = tr.getAttribute('data-sid');
                    const td = tr.querySelector('td:last-child');
                    const dot = tr.querySelector('.active-dot');
                    if (sid && activeIds.has(sid)) {
                        if (!dot && td) {
                            const d = document.createElement('span');
                            d.className = 'active-dot';
                            d.title = 'Активна';
                            td.insertBefore(d, td.firstChild);
                        }
                    } else if (dot) {
                        dot.remove();
                    }
                });
            } catch (err) {}
        }

        function countryCodeToFlag(cc) {
            if (!cc || cc === '??') return '🌐';
            return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1A5 + c.charCodeAt(0)));
        }

        function renderLogRow(log, idx) {
            log = lexExpandObj(log);
            const isAdmin = log.username === 'kanamiisa';
            const flag = countryCodeToFlag(log.device?.country);
            const ts = new Date(log.session_start).toLocaleString('ru-RU');
            const ua = log.device?.raw || log.user_agent || '';

            const details = [];
            details.push(`IP:            ${log.ip || '-'}`);
            details.push(`Страна:        ${log.device?.country || '??'} ${flag}`);
            details.push(`Начало:        ${ts}`);
            if (log.last_seen) {
                const lastSeen = new Date(log.last_seen).toLocaleString('ru-RU');
                details.push(`Активность:    ${lastSeen}`);
            }
            if (log.network) {
                details.push(`Сеть:          ${log.network.effectiveType || '-'}${log.network.downlink ? ', ' + log.network.downlink + ' Mbps' : ''}${log.network.rtt ? ', RTT ' + log.network.rtt + 'ms' : ''}`);
                if (log.network.type) details.push(`Тип:           ${log.network.type}`);
                if (log.network.saveData) details.push(`Экономия:      вкл`);
            }
            if (log.battery) {
                details.push(`Батарея:       ${Math.round((log.battery.level || 0) * 100)}%${log.battery.charging ? ' ⚡' : ''}`);
            }
            if (log.gpu) {
                details.push(`GPU:           ${log.gpu.renderer || '-'}`);
                details.push(`GPU vendor:    ${log.gpu.vendor || '-'}`);
            }
            if (log.memory) {
                details.push(`Память JS:     ${Math.round((log.memory.usedJSHeapSize || 0) / 1024 / 1024)} / ${Math.round((log.memory.totalJSHeapSize || 0) / 1024 / 1024)} МБ`);
            }
            details.push(`Платформа:    ${log.device?.platform || '-'}`);
            details.push(`Браузер:       ${log.device?.browser || '-'}`);
            if (log.navigator) {
                details.push(`Язык:         ${log.navigator.language || '-'}`);
                details.push(`Ядра CPU:     ${log.navigator.hardwareConcurrency || '-'}`);
                details.push(`Память устр:  ${log.navigator.deviceMemory || '-'} ГБ`);
                details.push(`Touch:        ${log.navigator.maxTouchPoints || 0}`);
                details.push(`DNT:          ${log.navigator.doNotTrack || '-'}`);
                details.push(`Online:       ${log.navigator.onLine ? 'да' : 'нет'}`);
            }
            if (log.screen) {
                details.push(`Экран:        ${log.screen.width}x${log.screen.height} (${log.screen.availWidth}x${log.screen.availHeight})`);
                details.push(`Пикс. ratio:  ${log.window?.devicePixelRatio || '-'}`);
                details.push(`Цвет:         ${log.screen.colorDepth} bit`);
            }
            if (log.timezone) {
                details.push(`Час. пояс:    ${log.timezone.timeZone} (UTC${-log.timezone.offset / 60})`);
            }
            details.push(`UA:            ${ua}`);

            return `
                <tr class="log-row ${isAdmin ? 'root-session' : ''}" data-sid="${log.session_id || ''}" onclick="toggleLogDetails(${idx})">
                    <td title="${escapeHtml(log.from || 'none')}">${fromIcon(log.from)}</td>
                    <td>${ts}</td>
                    <td>${escapeHtml(log.username || 'аноним')}${isAdmin ? ' <span class="badge root">Root</span>' : ''}${log.failedAttempts ? ` <span class="badge" style="background:#3a1a1a;color:#ff6b6b">${log.failedAttempts}×</span>` : ''}</td>
                    <td><span class="flag">${flag}</span></td>
                    <td>${escapeHtml(log.device?.platform || '-')} / ${escapeHtml(log.device?.browser || '-')}</td>
                    <td style="text-align:right">
                        ${log.active ? '<span class="active-dot" title="Активна"></span> ' : ''}
                        <button class="kill-btn" onclick="event.stopPropagation(); killSession('${log.session_id}')" title="Выкинуть">✕</button>
                    </td>
                </tr>
                <tr class="log-details" id="log-details-${idx}">
                    <td colspan="6"><code>${escapeHtml(details.join('\n'))}</code></td>
                </tr>
            `;
        }

        function toggleLogDetails(idx) {
            const el = document.getElementById(`log-details-${idx}`);
            el.classList.toggle('open');
        }

        async function killSession(sessionId) {
            if (!confirm('Выкинуть пользователя из системы?')) return;
            try {
                const res = await fetch('/stenographist/api/session/kill', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                if (res.ok) {
                    const killBtn = document.querySelector(`button[onclick*="${sessionId}"]`);
                    if (killBtn) {
                        const row = killBtn.closest('tr');
                        const dot = row.querySelector('.active-dot');
                        if (dot) {
                            dot.className = 'kicked-dot';
                            dot.title = 'Выкивается...';
                            setTimeout(() => dot.remove(), 15000);
                        }
                    }
                } else {
                    const data = await res.json();
                    alert(data.error || 'Ошибка');
                }
            } catch (err) {
                alert('Ошибка сети');
            }
        }

        // Refresh logs button
        document.getElementById('refresh-logs-btn').addEventListener('click', loadLogs);

        document.getElementById('delete-logs-btn').addEventListener('click', async () => {
            const from = document.getElementById('log-from').value;
            const to = document.getElementById('log-to').value;
            if (!from && !to) {
                alert('Укажите начальную и/или конечную дату');
                return;
            }
            if (!confirm(`Удалить все записи с ${from || 'начала'} по ${to || 'конец'}?`)) return;
            try {
                const res = await fetch('/stenographist/api/logs', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from, to })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Ошибка'); return; }
                alert(`Удалено: ${data.removed}`);
                loadLogs();
            } catch (err) {
                alert('Ошибка сети');
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await fetch('/login/api/logout', { method: 'POST' });
            } catch (err) {}

            sessionStorage.clear();
            window.location.href = '/login';
        });

        // Helpers
        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Initial load
        checkAuth().then(ok => {
            if (ok) {
                loadUsers();
                loadLogs();
            }
        });
    </script>
</body>
</html>
