name = "stenographist"
main = "index.js"
compatibility_date = "2024-12-01"

# Free tier — no paid plan required
# Workers AI is included in the free tier

# --- Workers AI binding ---
# Uncomment and add to your wrangler.toml after running `npx wrangler ai`:
# [ai]
# binding = "AI"

# --- KV Namespace for sessions ---
[[kv_namespaces]]
binding = "AUTH_KV"
id = "072e1df22e17491287febbc77eb72e47"

# --- R2 Bucket for audio storage (optional) ---
# Uncomment after creating an R2 bucket:
# [[r2_buckets]]
# binding = "AUDIO_BUCKET"
# bucket_name = "stenographist-audio"

# --- Environment variables ---
[vars]
# Set allowed origins (comma-separated) for CORS
ALLOWED_ORIGINS = "*"

# Uncomment and set these if using external APIs instead of Workers AI:
# DEEPGRAM_API_KEY = ""
# TOGETHER_API_KEY = ""

# --- Secrets (set via `npx wrangler secret put`) ---
# DEEPGRAM_API_KEY
# TOGETHER_API_KEY
